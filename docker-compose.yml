version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override API URL at build time if needed
        VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8000}
    container_name: health-companion-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - health-companion-network

networks:
  health-companion-network:
    driver: bridge
