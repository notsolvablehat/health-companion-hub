<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#f8fafc" />
  
  <!-- Outer Walls -->
  <rect x="50" y="50" width="900" height="900" fill="none" stroke="#334155" stroke-width="10" />
  
  <!-- Corridors -->
  <rect x="450" y="50" width="100" height="900" fill="#e2e8f0" />
  <rect x="50" y="450" width="900" height="100" fill="#e2e8f0" />
  
  <!-- Rooms / Departments -->
  <!-- Top Left: Radiology -->
  <rect x="60" y="60" width="380" height="380" fill="#dbeafe" stroke="#94a3b8" stroke-width="2" />
  <text x="250" y="250" font-family="sans-serif" font-size="40" fill="#1e40af" text-anchor="middle">Radiology</text>
  
  <!-- Top Right: Emergency -->
  <rect x="560" y="60" width="380" height="380" fill="#fee2e2" stroke="#94a3b8" stroke-width="2" />
  <text x="750" y="250" font-family="sans-serif" font-size="40" fill="#991b1b" text-anchor="middle">Emergency (ER)</text>
  
  <!-- Bottom Left: Pharmacy -->
  <rect x="60" y="560" width="380" height="380" fill="#dcfce7" stroke="#94a3b8" stroke-width="2" />
  <text x="250" y="750" font-family="sans-serif" font-size="40" fill="#166534" text-anchor="middle">Pharmacy</text>
  
  <!-- Bottom Right: Reception/Entrance -->
  <rect x="560" y="560" width="380" height="380" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="750" y="750" font-family="sans-serif" font-size="40" fill="#475569" text-anchor="middle">Main Entrance</text>
  
  <!-- Title -->
  <text x="500" y="30" font-family="sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Ground Floor</text>
</svg>
