<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#f8fafc" />
  
  <!-- Outer Walls -->
  <rect x="50" y="50" width="900" height="900" fill="none" stroke="#334155" stroke-width="10" />
  
  <!-- Corridors -->
  <rect x="450" y="50" width="100" height="900" fill="#e2e8f0" />
  <rect x="50" y="450" width="900" height="100" fill="#e2e8f0" />
  
  <!-- Rooms / Departments -->
  <!-- Top Left: Pediatrics -->
  <rect x="60" y="60" width="380" height="380" fill="#e0f2fe" stroke="#94a3b8" stroke-width="2" />
  <text x="250" y="250" font-family="sans-serif" font-size="40" fill="#075985" text-anchor="middle">Pediatrics</text>
  
  <!-- Top Right: Neurology -->
  <rect x="560" y="60" width="380" height="380" fill="#f3e8ff" stroke="#94a3b8" stroke-width="2" />
  <text x="750" y="250" font-family="sans-serif" font-size="40" fill="#6b21a8" text-anchor="middle">Neurology</text>
  
  <!-- Bottom Left: Wards -->
  <rect x="60" y="560" width="380" height="380" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
  <text x="250" y="750" font-family="sans-serif" font-size="40" fill="#475569" text-anchor="middle">Inpatient Wards</text>
  
  <!-- Bottom Right: Chapel -->
  <rect x="560" y="560" width="380" height="380" fill="#fff7ed" stroke="#94a3b8" stroke-width="2" />
  <text x="750" y="750" font-family="sans-serif" font-size="40" fill="#9a3412" text-anchor="middle">Chapel</text>
  
  <!-- Title -->
  <text x="500" y="30" font-family="sans-serif" font-size="24" fill="#64748b" text-anchor="middle">Second Floor</text>
</svg>
